<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-image">
        <div class="login-image-content">
          <h2>Bergabung dengan<br />Gerbang Literasi</h2>
          <p>
            Daftar gratis dan mulai pinjam ribuan buku dari koleksi perpustakaan
            digital kami.
          </p>
          <div class="login-image-stats">
            <div class="stat-item">
              <div class="stat-num">Gratis</div>
              <div class="stat-text">Pendaftaran</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">7 Hari</div>
              <div class="stat-text">Masa Pinjam</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">3 Buku</div>
              <div class="stat-text">Maks. Pinjam</div>
            </div>
          </div>
        </div>
      </div>
      <div class="login-form-side">
        <div class="login-form-inner">
          <div class="mb-3">
            <a href="index.html" class="text-muted small"
              ><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a
            >
          </div>
          <div class="text-center mb-4">
            <div
              class="d-inline-flex align-items-center justify-content-center mb-3"
              style="
                width: 52px;
                height: 52px;
                border-radius: 12px;
                background: var(--primary);
              "
            >
              <i class="bi bi-person-plus text-white fs-5"></i>
            </div>
            <h4 class="fw-bold mb-1">Buat Akun Baru</h4>
            <p class="text-muted small mb-0">
              Daftar untuk mulai meminjam buku
            </p>
          </div>
          <div
            id="regAlert"
            class="alert py-2 small"
            style="display: none"
            role="alert"
          ></div>
          <form onsubmit="handleRegister(event)">
            <div class="mb-3">
              <label class="form-label" for="regName">Nama Lengkap</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-person"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  id="regName"
                  placeholder="Nama lengkap Anda"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="regEmail">Email</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-envelope"></i
                ></span>
                <input
                  type="email"
                  class="form-control"
                  id="regEmail"
                  placeholder="email@example.com"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="regPassword">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  class="form-control"
                  id="regPassword"
                  placeholder="Min. 6 karakter"
                  required
                />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label" for="regConfirm"
                >Konfirmasi Password</label
              >
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-lock-fill"></i
                ></span>
                <input
                  type="password"
                  class="form-control"
                  id="regConfirm"
                  placeholder="Ulangi password"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mb-3">
              <i class="bi bi-person-plus me-2"></i>Daftar Sekarang
            </button>
            <p class="text-center text-muted small mb-0">
              Sudah punya akun? <a href="login.html">Masuk di sini</a>
            </p>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/render.js"></script>
  </body>
</html>
