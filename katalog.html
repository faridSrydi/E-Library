<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Buku — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body style="background: #fff">
    <nav
      class="navbar navbar-expand-lg sticky-top"
      style="background: #fff; border-bottom: 1px solid var(--border)"
    >
      <div class="container">
        <a
          class="navbar-brand fw-bold d-flex align-items-center gap-2"
          href="index.html"
          style="color: var(--primary)"
          ><img src="assets/img/icon.svg" alt="Logo" style="height: 56px; width: auto;"></a
        >
        <button
          class="navbar-toggler border-0"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <i class="bi bi-list fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto me-3 gap-1">
            <li class="nav-item">
              <a class="nav-link fw-medium" href="index.html">Beranda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fw-medium active" href="katalog.html"
                >Katalog Buku</a
              >
            </li>
          </ul>
          <div class="d-flex gap-2">
            <a
              href="login.html"
              class="btn btn-outline-custom"
              style="padding: 8px 20px; font-size: 0.85rem"
              >Masuk</a
            >
            <a
              href="register.html"
              class="btn btn-primary-custom"
              style="padding: 8px 20px; font-size: 0.85rem"
              >Daftar</a
            >
          </div>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div
        class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3"
      >
        <div>
          <h4 class="fw-bold mb-1">Katalog Buku</h4>
          <p class="text-muted small mb-0">
            Jelajahi seluruh koleksi perpustakaan digital
          </p>
        </div>
        <div class="search-box">
          <i class="bi bi-search"></i
          ><input
            type="text"
            id="searchInput"
            placeholder="Cari judul, penulis, ISBN..."
            oninput="searchBooks()"
          />
        </div>
      </div>
      <div class="card-clean">
        <div class="table-responsive">
          <table class="table table-clean mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>ISBN</th>
                <th>Buku</th>
                <th>Tahun</th>
                <th>Kategori</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="katalogBody"></tbody>
          </table>
        </div>
      </div>
      <div class="mt-3">
        <span id="bookCount" class="text-muted small"></span>
      </div>
    </div>

    <footer
      style="
        background: var(--bg);
        border-top: 1px solid var(--border);
        padding: 2rem 0;
        margin-top: 3rem;
      "
    >
      <div class="container text-center">
        <p class="text-muted small mb-0">
          &copy; 2026
          <strong style="color: var(--primary)">Gerbang Literasi</strong>. All
          rights reserved.
        </p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/render.js"></script>
  </body>
</html>
