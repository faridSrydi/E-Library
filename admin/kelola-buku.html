<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelola Buku — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="bi bi-book-half"></i> Gerbang Literasi
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"
          ><i class="bi bi-grid-1x2"></i> Dashboard</a
        >
        <a href="kelola-buku.html" class="sidebar-link active"
          ><i class="bi bi-book"></i> Kelola Buku</a
        >
        <a href="peminjaman.html" class="sidebar-link"
          ><i class="bi bi-arrow-left-right"></i> Peminjaman</a
        >
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link px-0" onclick="handleLogout(event)"
          ><i class="bi bi-box-arrow-left"></i> Keluar</a
        >
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <span class="topbar-title">Kelola Buku</span>
        </div>
        <div class="avatar" id="navAvatar">A</div>
      </div>
      <div class="content-area">
        <div
          class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3"
        >
          <div>
            <h5 class="fw-bold mb-1">Kelola Koleksi Buku</h5>
            <p class="text-muted small mb-0">
              Tambah, edit, atau hapus buku dari koleksi
            </p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <div class="search-box">
              <i class="bi bi-search"></i
              ><input
                type="text"
                id="searchInput"
                placeholder="Cari buku..."
                oninput="searchBooks()"
              />
            </div>
            <button
              class="btn btn-primary-custom"
              data-bs-toggle="modal"
              data-bs-target="#modalTambah"
              onclick="resetModal()"
              style="padding: 9px 18px; font-size: 0.85rem"
            >
              <i class="bi bi-plus-lg me-1"></i> Tambah Buku
            </button>
          </div>
        </div>
        <div class="card-clean">
          <div class="table-responsive">
            <table class="table table-clean mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>ISBN</th>
                  <th>Buku</th>
                  <th>Tahun</th>
                  <th>Kategori</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="kelolaBukuBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal Tambah/Edit -->
    <div class="modal fade" id="modalTambah" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 14px">
          <div class="modal-header">
            <h6 class="modal-title fw-bold" id="modalTitle">
              Tambah Buku Baru
            </h6>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editBookId" />
            <div class="mb-3">
              <label class="form-label small fw-medium">ISBN</label
              ><input
                type="text"
                id="inputIsbn"
                class="form-control"
                placeholder="978-602-xxx-xxx"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">Judul Buku</label
              ><input
                type="text"
                id="inputJudul"
                class="form-control"
                placeholder="Judul buku"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">Penulis</label
              ><input
                type="text"
                id="inputPenulis"
                class="form-control"
                placeholder="Nama penulis"
              />
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label small fw-medium">Tahun</label
                ><input
                  type="number"
                  id="inputTahun"
                  class="form-control"
                  placeholder="2024"
                />
              </div>
              <div class="col-6">
                <label class="form-label small fw-medium">Kategori</label
                ><select id="inputKategori" class="form-select">
                  <option>Fiksi</option>
                  <option>Non-Fiksi</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">Jumlah Halaman</label
              ><input
                type="number"
                id="inputHalaman"
                class="form-control"
                placeholder="300"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">Sinopsis</label
              ><textarea
                id="inputSinopsis"
                class="form-control"
                rows="3"
                placeholder="Deskripsi singkat..."
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-outline-custom"
              data-bs-dismiss="modal"
              style="padding: 8px 20px; font-size: 0.85rem"
            >
              Batal
            </button>
            <button
              class="btn btn-primary-custom"
              onclick="simpanBuku()"
              style="padding: 8px 20px; font-size: 0.85rem"
            >
              <i class="bi bi-check-lg me-1"></i>Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script>
      if (checkAuth("admin")) {
        document.getElementById("navAvatar").textContent = getInitials(
          localStorage.getItem("gl_name"),
        );
      }
    </script>
  </body>
</html>
