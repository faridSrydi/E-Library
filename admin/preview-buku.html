<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Buku — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body id="adminPreviewBuku">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="bi bi-book-half"></i> Gerbang Literasi
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"
          ><i class="bi bi-grid-1x2"></i> Dashboard</a
        >
        <a href="kelola-buku.html" class="sidebar-link active"
          ><i class="bi bi-book"></i> Kelola Buku</a
        >
        <a href="peminjaman.html" class="sidebar-link"
          ><i class="bi bi-arrow-left-right"></i> Peminjaman</a
        >
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link px-0" onclick="handleLogout(event)"
          ><i class="bi bi-box-arrow-left"></i> Keluar</a
        >
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <span class="topbar-title">Preview Buku</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div class="avatar" id="navAvatar">A</div>
        </div>
      </div>

      <div class="content-area">
        <a
          href="kelola-buku.html"
          class="btn btn-outline-custom mb-4"
          style="padding: 7px 16px; font-size: 0.84rem"
          ><i class="bi bi-arrow-left me-1"></i> Kembali ke Kelola Buku</a
        >
        <div id="adminPreviewContainer">
          <!-- Book Details will be rendered here by render.js -->
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script>
      if (checkAuth("admin")) {
        document.getElementById("navAvatar").textContent = getInitials(
          localStorage.getItem("gl_name"),
        );
      }
    </script>
  </body>
</html>
