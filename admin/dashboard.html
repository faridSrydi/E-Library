<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body id="adminDashboard">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="bi bi-book-half"></i> Gerbang Literasi
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"
          ><i class="bi bi-grid-1x2"></i> Dashboard</a
        >
        <a href="kelola-buku.html" class="sidebar-link"
          ><i class="bi bi-book"></i> Kelola Buku</a
        >
        <a href="peminjaman.html" class="sidebar-link"
          ><i class="bi bi-arrow-left-right"></i> Peminjaman</a
        >
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link px-0" onclick="handleLogout(event)"
          ><i class="bi bi-box-arrow-left"></i> Keluar</a
        >
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <span class="topbar-title">Dashboard Admin</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div class="avatar" id="navAvatar">A</div>
          <div class="d-none d-sm-block">
            <div class="small fw-semibold" id="userName">Admin</div>
            <div class="text-muted" style="font-size: 0.72rem" id="userRole">
              Admin
            </div>
          </div>
        </div>
      </div>

      <div class="content-area">
        <div class="mb-4">
          <h5 class="fw-bold mb-1">Selamat Datang, Admin! 👋</h5>
          <p class="text-muted small mb-0">
            Ringkasan perpustakaan digital hari ini.
          </p>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-xl-4 col-sm-6">
            <div class="stat-card">
              <div class="stat-icon blue"><i class="bi bi-book"></i></div>
              <div class="stat-value" id="statBooks">0</div>
              <div class="stat-label">Total Buku</div>
            </div>
          </div>
          <div class="col-xl-4 col-sm-6">
            <div class="stat-card">
              <div class="stat-icon green"><i class="bi bi-people"></i></div>
              <div class="stat-value" id="statMembers">0</div>
              <div class="stat-label">Total Anggota</div>
            </div>
          </div>
          <div class="col-xl-4 col-sm-6">
            <div class="stat-card">
              <div class="stat-icon amber">
                <i class="bi bi-arrow-left-right"></i>
              </div>
              <div class="stat-value" id="statBorrowed">0</div>
              <div class="stat-label">Buku Dipinjam</div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card-clean">
              <div
                class="d-flex align-items-center justify-content-between p-3 border-bottom"
              >
                <h6 class="fw-bold mb-0">
                  <i class="bi bi-clock-history me-2 text-primary"></i
                  >Peminjaman Terbaru
                </h6>
                <a
                  href="peminjaman.html"
                  class="btn btn-sm btn-outline-custom"
                  style="padding: 4px 12px; font-size: 0.78rem"
                  >Lihat Semua</a
                >
              </div>
              <div class="table-responsive">
                <table class="table table-clean mb-0">
                  <thead>
                    <tr>
                      <th>Peminjam</th>
                      <th>Buku</th>
                      <th>Tanggal</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="recentBorrows"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card-clean h-100">
              <div class="p-3 border-bottom">
                <h6 class="fw-bold mb-0">
                  <i class="bi bi-fire me-2" style="color: var(--warning)"></i
                  >Buku Populer
                </h6>
              </div>
              <div class="p-3" id="popularList"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script>
      if (checkAuth("admin")) {
        document.getElementById("navAvatar").textContent = getInitials(
          localStorage.getItem("gl_name"),
        );
      }
    </script>
  </body>
</html>
