<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peminjaman — Gerbang Literasi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="bi bi-book-half"></i> Gerbang Literasi
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"
          ><i class="bi bi-grid-1x2"></i> Dashboard</a
        >
        <a href="kelola-buku.html" class="sidebar-link"
          ><i class="bi bi-book"></i> Kelola Buku</a
        >
        <a href="peminjaman.html" class="sidebar-link active"
          ><i class="bi bi-arrow-left-right"></i> Peminjaman</a
        >
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link px-0" onclick="handleLogout(event)"
          ><i class="bi bi-box-arrow-left"></i> Keluar</a
        >
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
          </button>
          <span class="topbar-title">Kelola Peminjaman</span>
        </div>
        <div class="avatar" id="navAvatar">A</div>
      </div>
      <div class="content-area">
        <div
          class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3"
        >
          <div>
            <h5 class="fw-bold mb-1">Transaksi Peminjaman</h5>
            <p class="text-muted small mb-0">
              Kelola peminjaman dan pengembalian buku
            </p>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-4 col-12">
            <div class="stat-card">
              <div class="stat-icon blue">
                <i class="bi bi-arrow-up-right"></i>
              </div>
              <div class="stat-value" id="pStatActive">0</div>
              <div class="stat-label">Sedang Dipinjam</div>
            </div>
          </div>
          <div class="col-md-4 col-12">
            <div class="stat-card">
              <div class="stat-icon green">
                <i class="bi bi-check-circle"></i>
              </div>
              <div class="stat-value" id="pStatReturned">0</div>
              <div class="stat-label">Dikembalikan</div>
            </div>
          </div>
          <div class="col-md-4 col-12">
            <div class="stat-card">
              <div class="stat-icon purple">
                <i class="bi bi-list-task"></i>
              </div>
              <div class="stat-value" id="pStatTotal">0</div>
              <div class="stat-label">Total Transaksi</div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 mb-4 flex-wrap">
          <button class="filter-btn active" onclick="filterPeminjaman('')">
            Semua
          </button>
          <button class="filter-btn" onclick="filterPeminjaman('dipinjam')">
            Dipinjam
          </button>
          <button class="filter-btn" onclick="filterPeminjaman('dikembalikan')">
            Dikembalikan
          </button>
        </div>

        <div class="card-clean">
          <div class="table-responsive">
            <table class="table table-clean mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Anggota (User)</th>
                  <th>Email</th>
                  <th>Buku</th>
                  <th>Tgl Pinjam</th>
                  <th>Tgl Kembali</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="peminjamanBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script>
      if (checkAuth("admin")) {
        document.getElementById("navAvatar").textContent = getInitials(
          localStorage.getItem("gl_name"),
        );
      }
    </script>
  </body>
</html>
